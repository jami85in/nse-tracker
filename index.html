<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

// ── Design Tokens ────────────────────────────────────────────────────────────
const T = {
  bg: "#0A0E1A", surface: "#111827", card: "#161D2E", border: "#1E2D45",
  accent: "#00D4AA", accentDim: "#00D4AA22", blast: "#FF6B35", blastDim: "#FF6B3522",
  warn: "#FFB800", warnDim: "#FFB80022", text: "#E8EDF5", muted: "#6B7A99",
  green: "#22C55E", red: "#EF4444", white: "#FFFFFF",
};

// ── Config ───────────────────────────────────────────────────────────────────
const GITHUB_USER = "jami85in";
const GITHUB_REPO = "nse-tracker";
const GITHUB_RAW_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/data/scan_latest.json`;
const GITHUB_APP_ACTIONS_URL = `https://github.com/${GITHUB_USER}/${GITHUB_REPO}/actions/workflows/scan.yml`;

async function fetchScanData() {
  const res = await fetch(`${GITHUB_RAW_URL}?t=${Date.now()}`);
  if (!res.ok) throw new Error(`GitHub responded with ${res.status}. Check the repo is public and the file path is data/scan_latest.json on the main branch.`);
  return res.json();
}

// ── Utility ───────────────────────────────────────────────────────────────────
const fmt = (n, d = 2) => (typeof n === "number" ? n.toFixed(d) : "—");
const pct = n => (n >= 0 ? "+" : "") + fmt(n) + "%";
const curr = n => "₹" + (n >= 1000 ? n.toLocaleString("en-IN", { maximumFractionDigits: 2 }) : fmt(n));
const nowStr = () => new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata", hour12: false });
const uid = () => Math.random().toString(36).slice(2, 9);

function Pill({ label, color }) {
  const map = { HIGH: T.accent, MEDIUM: T.warn, LOW: T.red, BULLISH: T.green, NEUTRAL: T.warn, BEARISH: T.red };
  const c = map[label] || color || T.muted;
  return (
    <span style={{ background: c + "22", color: c, border: `1px solid ${c}44`, borderRadius: 4, padding: "2px 8px", fontSize: 11, fontWeight: 700, letterSpacing: 0.5, whiteSpace: "nowrap" }}>
      {label}
    </span>
  );
}

function Stat({ label, value, color }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 2, minWidth: 0 }}>
      <span style={{ color: T.muted, fontSize: 10, letterSpacing: 0.6, textTransform: "uppercase" }}>{label}</span>
      <span style={{ color: color || T.text, fontSize: 13, fontWeight: 700, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{value}</span>
    </div>
  );
}

function PullToRefresh({ onRefresh, children, refreshing }) {
  const startY = useRef(0);
  const [pull, setPull] = useState(0);
  const dragging = useRef(false);

  const onTouchStart = e => {
    if (window.scrollY === 0) { startY.current = e.touches[0].clientY; dragging.current = true; }
  };
  const onTouchMove = e => {
    if (!dragging.current) return;
    const dy = e.touches[0].clientY - startY.current;
    if (dy > 0 && window.scrollY === 0) setPull(Math.min(dy * 0.5, 90));
  };
  const onTouchEnd = () => {
    if (pull > 60) onRefresh();
    setPull(0);
    dragging.current = false;
  };

  return (
    <div onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
      <div style={{ height: refreshing ? 50 : pull, transition: refreshing ? "none" : "height 0.2s", display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
        <span style={{ color: T.accent, fontSize: 13, transform: refreshing ? "none" : `rotate(${pull * 3}deg)`, display: "inline-block" }}>
          {refreshing ? "⟳ Refreshing…" : pull > 60 ? "↻ Release to refresh" : pull > 10 ? "↓ Pull to refresh" : ""}
        </span>
      </div>
      {children}
    </div>
  );
}

function SqueezeCard({ stock, onInvest }) {
  const [expanded, setExpanded] = useState(false);
  return (
    <div style={{ background: T.card, border: `1px solid ${T.accent}44`, borderLeft: `3px solid ${T.accent}`, borderRadius: 10, padding: 14, cursor: "pointer" }}
      onClick={() => setExpanded(e => !e)}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
        <div style={{ minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
            <span style={{ color: T.accent, fontWeight: 800, fontSize: 16, fontFamily: "monospace" }}>{stock.symbol}</span>
            <Pill label={stock.confidence} />
          </div>
          <div style={{ color: T.muted, fontSize: 11, marginTop: 2 }}>NSE · Daily chart</div>
        </div>
        <div style={{ textAlign: "right", flexShrink: 0 }}>
          <div style={{ color: T.white, fontWeight: 700, fontSize: 17 }}>{curr(stock.price)}</div>
          <div style={{ color: T.green, fontSize: 13, fontWeight: 700 }}>+{fmt(stock.predicted_return)}% est.</div>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 10, marginTop: 12 }}>
        <Stat label="BB Width" value={fmt(stock.bb_width) + "%"} color={stock.bb_width < 1.8 ? T.accent : T.warn} />
        <Stat label="Stoch K" value={fmt(stock.stoch_k)} color={stock.stoch_k < 45 ? T.accent : T.warn} />
        <Stat label="Target R1" value={curr(stock.pivot_r1)} color={T.green} />
        <Stat label="Stop S1" value={curr(stock.pivot_s1)} color={T.red} />
      </div>
      {expanded && (
        <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${T.border}` }}>
          <div style={{ color: T.muted, fontSize: 12, marginBottom: 10, lineHeight: 1.5 }}>{stock.reason}</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 10, marginBottom: 12 }}>
            <Stat label="EMA 10" value={curr(stock.ema10)} />
            <Stat label="EMA 30" value={curr(stock.ema30)} />
            <Stat label="Target R2" value={curr(stock.pivot_r2)} color={T.green} />
          </div>
          <button onClick={e => { e.stopPropagation(); onInvest(stock); }}
            style={{ background: T.accent, color: "#000", border: "none", borderRadius: 8, padding: "12px 18px", fontWeight: 800, fontSize: 14, cursor: "pointer", width: "100%" }}>
            📈 Add to Portfolio
          </button>
        </div>
      )}
    </div>
  );
}

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
        <div style={{ minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
            <span style={{ color: T.blast, fontWeight: 800, fontSize: 16, fontFamily: "monospace" }}>{stock.symbol}</span>
            <Pill label="EXIT SIGNAL" color={T.blast} />
          </div>
          <div style={{ color: T.muted, fontSize: 11, marginTop: 2 }}>NSE · Daily chart</div>
        </div>
        <div style={{ textAlign: "right", flexShrink: 0 }}>
          <div style={{ color: T.white, fontWeight: 700, fontSize: 17 }}>{curr(stock.price)}</div>
          <div style={{ color: T.blast, fontSize: 12, fontWeight: 700 }}>Stoch {fmt(stock.stoch_k)}</div>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 10, marginTop: 12 }}>
        <Stat label="vs EMA30" value={pct(stock.predicted_return)} color={T.green} />
        <Stat label="Exit Zone" value={curr(stock.pivot_r2)} color={T.blast} />
      </div>
      <div style={{ color: T.muted, fontSize: 12, marginTop: 10, lineHeight: 1.5 }}>{stock.reason}</div>

function InvestModal({ stock, onClose, onConfirm }) {
  const [qty, setQty] = useState(10);
  const [entryPrice, setEntryPrice] = useState(stock?.price || 0);
  const [notes, setNotes] = useState("");
  if (!stock) return null;
  const invested = qty * entryPrice;
  const targetVal = qty * (stock.pivot_r1 || stock.price * 1.07);
  const predReturn = invested ? (((targetVal - invested) / invested) * 100).toFixed(1) : "0";

  const inp = (val, set, prefix = "", step = "1") => (
    <div style={{ display: "flex", alignItems: "center", background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: "12px 14px" }}>
      {prefix && <span style={{ color: T.muted, marginRight: 6, fontSize: 15 }}>{prefix}</span>}
      <input type="number" inputMode="decimal" step={step} value={val} onChange={e => set(Number(e.target.value))}
        style={{ background: "transparent", border: "none", outline: "none", color: T.text, fontSize: 16, width: "100%" }} />
    </div>
  );

  return (
    <div style={{ position: "fixed", inset: 0, background: "#000000DD", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 100 }}>
      <div style={{ background: T.card, borderTopLeftRadius: 18, borderTopRightRadius: 18, padding: "20px 18px calc(20px + env(safe-area-inset-bottom))", width: "100%", maxWidth: 480, maxHeight: "88vh", overflowY: "auto" }}>
        <div style={{ width: 36, height: 4, background: T.border, borderRadius: 2, margin: "0 auto 16px" }} />
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 18 }}>
          <span style={{ color: T.accent, fontWeight: 800, fontSize: 18 }}>Add Position: {stock.symbol}</span>
          <button onClick={onClose} style={{ background: T.surface, border: "none", color: T.muted, cursor: "pointer", fontSize: 16, width: 30, height: 30, borderRadius: 15 }}>✕</button>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div><div style={{ color: T.muted, fontSize: 11, marginBottom: 5 }}>QUANTITY (shares)</div>{inp(qty, setQty)}</div>
          <div><div style={{ color: T.muted, fontSize: 11, marginBottom: 5 }}>ENTRY PRICE</div>{inp(entryPrice, setEntryPrice, "₹", "0.05")}</div>
          <div style={{ background: T.surface, borderRadius: 10, padding: 14 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Stat label="Invested" value={curr(invested)} />
              <Stat label="Target (R1)" value={curr(targetVal)} color={T.green} />
              <Stat label="Pred. Return" value={"+" + predReturn + "%"} color={T.green} />
              <Stat label="Stop Loss" value={curr(qty * (stock.pivot_s1 || stock.price * 0.96))} color={T.red} />
            </div>
          </div>
          <div>
            <div style={{ color: T.muted, fontSize: 11, marginBottom: 5 }}>NOTES (optional)</div>
            <textarea value={notes} onChange={e => setNotes(e.target.value)} rows={2}
              style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: "10px 12px", color: T.text, fontSize: 14, width: "100%", resize: "none", outline: "none" }} />
          </div>
          <button onClick={() => onConfirm({ ...stock, qty, entryPrice, notes, invested, targetPrice: stock.pivot_r1, stopLoss: stock.pivot_s1, id: uid(), date: nowStr(), status: "OPEN", currentPrice: entryPrice, actualReturn: 0 })}
            style={{ background: T.accent, color: "#000", border: "none", borderRadius: 10, padding: "14px", fontWeight: 800, fontSize: 15, cursor: "pointer" }}>
            ✅ Confirm Investment
          </button>
        </div>
      </div>
    </div>
  );
}

function PortfolioRow({ pos, onClose }) {
  const [sellPrice, setSellPrice] = useState("");
  const [showSell, setShowSell] = useState(false);
  const isOpen = pos.status === "OPEN";
  const liveReturn = ((pos.currentPrice - pos.entryPrice) / pos.entryPrice) * 100;
  const targetReturn = pos.targetPrice ? ((pos.targetPrice - pos.entryPrice) / pos.entryPrice) * 100 : pos.predicted_return;
  const achieved = pos.status === "CLOSED" ? ((pos.exitPrice - pos.entryPrice) / pos.entryPrice) * 100 : null;

  return (
    <div style={{ background: T.card, border: `1px solid ${T.border}`, borderRadius: 10, padding: 14, marginBottom: 8 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
        <div style={{ minWidth: 0 }}>
          <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
            <span style={{ color: T.text, fontWeight: 700, fontFamily: "monospace" }}>{pos.symbol}</span>
            <Pill label={pos.status} color={isOpen ? T.accent : T.muted} />
          </div>
          <div style={{ color: T.muted, fontSize: 11, marginTop: 3 }}>{pos.qty} sh @ {curr(pos.entryPrice)} · {pos.date}</div>
        </div>
        <div style={{ textAlign: "right", flexShrink: 0 }}>
          <div style={{ color: isOpen ? (liveReturn >= 0 ? T.green : T.red) : achieved >= 0 ? T.green : T.red, fontWeight: 800, fontSize: 16 }}>
            {isOpen ? pct(liveReturn) : pct(achieved)}
          </div>
          <div style={{ color: T.muted, fontSize: 11 }}>{isOpen ? `Live ${curr(pos.currentPrice)}` : `Sold ${curr(pos.exitPrice)}`}</div>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 8, marginTop: 10 }}>
        <Stat label="Invested" value={curr(pos.invested)} />
        <Stat label="Pred. %" value={"+" + fmt(targetReturn) + "%"} color={T.warn} />
        <Stat label="Target" value={pos.targetPrice ? curr(pos.targetPrice) : "—"} color={T.green} />
        <Stat label="Stop" value={pos.stopLoss ? curr(pos.stopLoss) : "—"} color={T.red} />
      </div>
      {pos.notes && <div style={{ color: T.muted, fontSize: 11, marginTop: 8 }}>📝 {pos.notes}</div>}
      {isOpen && (
        <div style={{ marginTop: 10, display: "flex", gap: 8, flexWrap: "wrap" }}>
          {!showSell ? (
            <button onClick={() => setShowSell(true)}
              style={{ background: T.blast + "22", border: `1px solid ${T.blast}`, color: T.blast, borderRadius: 8, padding: "10px 16px", fontSize: 13, fontWeight: 700, cursor: "pointer", flex: "1 1 auto" }}>
              📤 Mark Sold
            </button>
          ) : (
            <>
              <input type="number" inputMode="decimal" placeholder="Exit price ₹" value={sellPrice} onChange={e => setSellPrice(e.target.value)}
                style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: "10px 12px", color: T.text, fontSize: 14, flex: "1 1 100px", outline: "none" }} />
              <button onClick={() => { if (sellPrice) { onClose(pos.id, Number(sellPrice)); setShowSell(false); } }}
                style={{ background: T.blast, color: "#fff", border: "none", borderRadius: 8, padding: "10px 16px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                Confirm
              </button>
              <button onClick={() => setShowSell(false)}
                style={{ background: T.surface, border: `1px solid ${T.border}`, color: T.muted, borderRadius: 8, padding: "10px 12px", fontSize: 13, cursor: "pointer" }}>
                Cancel
              </button>
            </>
          )}
        </div>
      )}
    </div>
  );
}

function PortfolioSummary({ positions }) {
  const closed = positions.filter(p => p.status === "CLOSED");
  const open = positions.filter(p => p.status === "OPEN");
  const totalInvested = positions.reduce((s, p) => s + p.invested, 0);
  const realizedPL = closed.reduce((s, p) => s + (p.exitPrice - p.entryPrice) * p.qty, 0);
  const unrealizedPL = open.reduce((s, p) => s + (p.currentPrice - p.entryPrice) * p.qty, 0);
  const winRate = closed.length ? ((closed.filter(p => p.exitPrice > p.entryPrice).length / closed.length) * 100).toFixed(0) : 0;

  return (
    <div style={{ background: T.card, border: `1px solid ${T.border}`, borderRadius: 12, padding: 16, marginBottom: 16 }}>
      <div style={{ color: T.muted, fontSize: 11, marginBottom: 12, letterSpacing: 1 }}>PORTFOLIO SUMMARY</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 14 }}>
        <Stat label="Total Invested" value={curr(totalInvested)} />
        <Stat label="Win Rate" value={winRate + "%"} color={Number(winRate) > 60 ? T.green : T.warn} />
        <Stat label="Realized P&L" value={(realizedPL >= 0 ? "+" : "") + curr(Math.abs(realizedPL))} color={realizedPL >= 0 ? T.green : T.red} />
        <Stat label="Unrealized P&L" value={(unrealizedPL >= 0 ? "+" : "") + curr(Math.abs(unrealizedPL))} color={unrealizedPL >= 0 ? T.green : T.red} />
        <Stat label="Open" value={open.length} />
        <Stat label="Closed" value={closed.length} />
      </div>
    </div>
  );
}

function Countdown({ nextAt }) {
  const [left, setLeft] = useState(0);
  useEffect(() => {
    const tick = () => setLeft(Math.max(0, nextAt - Date.now()));
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [nextAt]);
  const m = Math.floor(left / 60000);
  const s = Math.floor((left % 60000) / 1000);
  return <span style={{ color: T.muted, fontFamily: "monospace", fontSize: 11 }}>{m}m {s}s</span>;
}

      {items.map(it => (
        <button key={it.id} onClick={() => setTab(it.id)}

          </span>
          <span style={{ fontSize: 10, fontWeight: tab === it.id ? 700 : 500 }}>{it.label}</span>

      ))}

  );
}

  const savePositions = ps => {
    setPositions(ps);
    try { localStorage.setItem("nse_positions", JSON.stringify(ps)); } catch {}
  };

  const loadData
