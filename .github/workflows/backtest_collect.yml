name: NSE Historical Backtest Collector

# Incrementally builds a multi-year daily-close history for backtesting the
# squeeze/blast strategy per stock. Each run now processes MULTIPLE date
# chunks in a loop (see backtest_fetch.py) within an 8-minute time budget,
# rather than just one chunk per invocation — since a single chunk only
# takes a few seconds, this lets one run cover many chunks back-to-back.
#
# Scheduled every 5 minutes — GitHub's documented minimum interval for the
# `schedule` trigger (anything more frequent is silently ignored/coalesced
# by GitHub). Combined with multi-chunk-per-run, this should complete the
# full collection significantly faster than the original one-chunk-per-run
# design, while still respecting GitHub's platform limits.
#
# `concurrency` with cancel-in-progress:false ensures overlapping runs never
# stomp on each other — if a run is still going when the next 5-min tick
# fires, the new one waits in queue rather than racing.
#
# Prerequisite: repo secret BACKTEST_WORKER_URL set to your deployed
# nse-backtest Cloudflare Worker's base URL.

on:
  schedule:
    - cron: "*/5 * * * *"    # every 5 minutes — GitHub's practical floor
  workflow_dispatch:          # manual trigger to kick off / retry immediately

permissions:
  contents: write

concurrency:
  group: nse-backtest-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 12   # safety margin above the 8-min in-script budget
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch backtest chunks (loops for up to ~8 min per run)
        env:
          BACKTEST_WORKER_URL: ${{ secrets.BACKTEST_WORKER_URL }}
          BACKTEST_CHUNK_DAYS: "28"
          BACKTEST_START_DATE: "2020-09-01"
          BACKTEST_TIME_BUDGET_SECONDS: "480"   # 8 minutes of chunk-fetching
          BACKTEST_PAUSE_SECONDS: "5"           # brief pause between chunks
        run: python scripts/backtest_fetch.py

      - name: Commit accumulated data
        if: always()   # commit whatever was gathered even if the fetch step above hit its time budget mid-way
        run: |
          git config user.name "nse-tracker-bot"
          git config user.email "actions@github.com"
          git add data/backtest/
          git diff --staged --quiet || git commit -m "backtest: chunks collected $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin main || true
          git push
