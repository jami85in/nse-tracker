name: Kite Daily Token Refresh

# Zerodha's Kite Connect access tokens expire daily (SEBI security rule —
# every broker's API works this way, not a Zerodha limitation). This
# workflow is the daily "activate today's token" step:
#
# 1. Trigger this workflow with request_token left BLANK. The log prints
#    today's login URL.
# 2. Open that URL, log in to Zerodha (+2FA). You'll be redirected to
#    https://127.0.0.1/?request_token=XXXXX&... — the page itself will
#    fail to load (expected, ignore it), but the URL bar has the token.
# 3. Copy the value after request_token=
# 4. Trigger this workflow AGAIN, pasting that token into the input box.
# 5. This exchanges it for a real access_token and commits it to the
#    PRIVATE secrets repo (kite_token.json) — never into this public repo.

on:
  workflow_dispatch:
    inputs:
      request_token:
        description: "Paste the request_token from today's Zerodha login redirect URL (leave blank to just get the login link)"
        required: false
        default: ""

permissions:
  contents: read   # this workflow no longer writes to THIS repo at all

jobs:
  refresh_token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install kiteconnect
        run: pip install kiteconnect

      - name: Generate token (or print login link)
        env:
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
          SECRETS_REPO_PAT: ${{ secrets.SECRETS_REPO_PAT }}
          SECRETS_REPO: ${{ secrets.SECRETS_REPO }}
        run: |
          if [ -z "${{ github.event.inputs.request_token }}" ]; then
            python3 scripts/kite_generate_token.py
          else
            python3 scripts/kite_generate_token.py "${{ github.event.inputs.request_token }}"
          fi
