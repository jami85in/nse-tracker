name: NSE Index & Sectoral Data Collector

# Collects daily NIFTY 50 + sectoral index data for relative-strength
# analysis (is a stock moving with or against its sector/the broader market).

on:
  schedule:
    - cron: "7-59/5 * * * *"   # offset from the OHLC collector to avoid both hammering the Worker at :00
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nse-index-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch index chunks
        env:
          BACKTEST_WORKER_URL: ${{ secrets.BACKTEST_WORKER_URL }}
          INDEX_CHUNK_DAYS: "28"
          INDEX_START_DATE: "2020-09-01"
          INDEX_TIME_BUDGET_SECONDS: "300"
          INDEX_PAUSE_SECONDS: "5"
        run: python scripts/index_fetch.py

      - name: Commit accumulated data
        if: always()
        run: |
          git config user.name "nse-tracker-bot"
          git config user.email "actions@github.com"
          git add data/backtest/raw_indices/ data/backtest/progress_indices.json
          git diff --staged --quiet || git commit -m "index-data: chunks collected $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin main || true
          git push
