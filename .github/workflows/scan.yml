name: NSE Squeeze & Blast Scan

on:
  schedule:
    - cron: "15 10 * * 1-5"   # 15:45 IST weekdays — ~15 min after close, candle settled
    - cron: "15 10 * * 0,6"   # 15:45 IST weekends — no-ops on ordinary Sat/Sun,
                                # scans if NSE schedules a special weekend session
  workflow_dispatch:          # manual trigger from the Actions tab / GitHub app
    inputs:
      backfill_days:
        description: "Reconstruct the last N trading days into the ledger (0 = normal single-day scan)"
        required: false
        default: "0"
        type: string
      diagnose:
        description: "Run diagnostic mode instead of a normal scan? Shows near-miss stocks, no Claude call, no ledger write — check the Actions log for output"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      force_weekend:
        description: "Force the scan to run even on a weekend/holiday (for manual weekend analysis). Uses the most recent trading day's data."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days || '0' }}
          DIAGNOSE: ${{ github.event.inputs.diagnose || 'false' }}
          # Manual triggers (workflow_dispatch) default force_weekend=true so a
          # weekend analysis run actually executes. Scheduled runs have no inputs,
          # so this evaluates empty and the flag is not passed.
          FORCE_WEEKEND: ${{ github.event.inputs.force_weekend }}
        run: |
          if [ "$DIAGNOSE" = "true" ]; then
            python scripts/scan.py --diagnose
          elif [ "$FORCE_WEEKEND" = "true" ]; then
            python scripts/scan.py --backfill-days "$BACKFILL_DAYS" --allow-weekend
          else
            python scripts/scan.py --backfill-days "$BACKFILL_DAYS"
          fi

      - name: Commit results
        run: |
          git config user.name "nse-tracker-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "scan: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
