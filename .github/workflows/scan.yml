name: NSE Squeeze & Blast Scan

# The scan runs AFTER the "NSE Daily OHLC Refresh" workflow completes, so it
# always scans on fully-settled closing prices. Previously it ran at 15:45 IST
# — before NSE publishes the final bhavcopy (~18:30) and before the 19:00 OHLC
# refresh — so it used the PREVIOUS day's close for the entry bar, which is why
# dashboard prices lagged a day. Chaining it to the OHLC refresh also means any
# time you re-run the OHLC refresh (e.g. to pull final closes), the scan
# re-runs automatically on the fresh data — no manual trigger needed.
#
# Note: the scan chains off the OHLC refresh (which needs no Kite token), NOT
# the metadata build (which does), so a stale Kite token can never block the
# daily scan. The scan uses the most recently committed symbols_meta.json.

on:
  workflow_run:
    workflows: ["NSE Daily OHLC Refresh"]
    types: [completed]
  workflow_dispatch:
    inputs:
      backfill_days:
        description: "Reconstruct the last N trading days into the ledger (0 = normal single-day scan)"
        required: false
        default: "0"
        type: string
      diagnose:
        description: "Run diagnostic mode instead of a normal scan? Shows near-miss stocks, no Claude call, no ledger write — check the Actions log for output"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      force_weekend:
        description: "Force the scan to run even on a weekend/holiday (for manual weekend analysis). Uses the most recent trading day's data."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: nse-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BACKFILL_DAYS: ${{ github.event.inputs.backfill_days || '0' }}
          DIAGNOSE: ${{ github.event.inputs.diagnose || 'false' }}
          # Manual triggers (workflow_dispatch) default force_weekend=true so a
          # weekend analysis run actually executes. workflow_run / scheduled
          # runs have no inputs, so this evaluates empty and the flag isn't set.
          FORCE_WEEKEND: ${{ github.event.inputs.force_weekend }}
        run: |
          if [ "$DIAGNOSE" = "true" ]; then
            python scripts/scan.py --diagnose
          elif [ "$FORCE_WEEKEND" = "true" ]; then
            python scripts/scan.py --backfill-days "$BACKFILL_DAYS" --allow-weekend
          else
            python scripts/scan.py --backfill-days "$BACKFILL_DAYS"
          fi

      - name: Commit results
        run: |
          git config user.name "nse-tracker-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "scan: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin main || true
          git push
